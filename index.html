<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempo sem briga</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background: linear-gradient(-45deg, #0f172a, #1e1b4b, #020617, #1e293b);
  background-size: 400% 400%;
  animation: bg 12s ease infinite;
  overflow:hidden;
}

@keyframes bg {
  0% { background-position:0% 50% }
  50% { background-position:100% 50% }
  100% { background-position:0% 50% }
}

#stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  padding:40px;
  border-radius:25px;
  text-align:center;
  width:420px;
  animation: aparecer 1s ease;
}

@keyframes aparecer {
  from { opacity:0; transform: translateY(20px); }
  to { opacity:1; transform: translateY(0); }
}

.titulo h1 {
  font-size:1.8rem;
  background: linear-gradient(90deg, #facc15, #a78bfa, #facc15);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: brilho 3s linear infinite;
}

@keyframes brilho {
  0% { background-position: 0% }
  100% { background-position: 200% }
}

.titulo p {
  font-size:0.9rem;
  opacity:0.7;
  margin-top:5px;
}

.tempo {
  display:flex;
  gap:10px;
  margin-top:20px;
}

.box {
  flex:1;
  background: rgba(255,255,255,0.06);
  padding:15px;
  border-radius:15px;
}

.numero {
  font-size:2rem;
  font-weight:bold;
}

.label {
  font-size:0.7rem;
  opacity:0.7;
}

.mensagem {
  margin-top:20px;
  font-size:0.9rem;
  opacity:0.9;
}

button {
  margin-top:15px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#a78bfa;
  color:white;
  cursor:pointer;
}

.meta {
  margin-top:15px;
  font-size:0.85rem;
  opacity:0.85;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="card">

  <div class="titulo">
    <h1>⏳ Tempo sem briga</h1>
    <p id="subtitulo"></p>
  </div>

  <div class="tempo">
    <div class="box"><div class="numero" id="dias">0</div><div class="label">Dias</div></div>
    <div class="box"><div class="numero" id="horas">0</div><div class="label">Horas</div></div>
    <div class="box"><div class="numero" id="minutos">0</div><div class="label">Min</div></div>
    <div class="box"><div class="numero" id="segundos">0</div><div class="label">Seg</div></div>
  </div>

  <div class="mensagem" id="mensagem"></div>

  <button onclick="mensagemSurpresa()">💌 Mensagem pra você</button>

  <div class="meta" id="meta"></div>

</div>

<script>
// DATA
let dataInicial = new Date("2025-10-12T11:00:00");

// formatar
function formatarData(data) {
  return data.toLocaleDateString("pt-BR") + " às " +
         data.toLocaleTimeString("pt-BR", { hour: '2-digit', minute: '2-digit' });
}

subtitulo.innerText = "desde " + formatarData(dataInicial);

// mensagens
function mensagemTempo(dias){
  if(dias < 1) return "todo começo importa ❤️";
  if(dias < 7) return "uma semana quase... tô gostando disso 🥹";
  if(dias < 30) return "isso aqui já tá diferente 💜";
  if(dias < 100) return "orgulho da gente, de verdade ✨";
  return "quem diria em pipis que eu ia aguentar tampo tempo";

function mensagemSurpresa(){
  const frases = [
    "você é a chatinha mais legal do mundo ❤️";",
    "espero que esse tempo nunca mais zere",
    "você vale a pena, até nos dias difíceis pipis",
    "eu gosto da gente",
    "queria ter a chance de estar todos os dias ao seu lado"
  ];
  alert(frases[Math.floor(Math.random()*frases.length)]);
}

// metas
const metas = [1, 7, 30, 100, 365];

// animação contador
let inicio = Date.now();
let duracao = 1500;

function update(){
  let agora = Date.now();
  let progresso = Math.min((agora - inicio) / duracao, 1);

  const diffReal = new Date() - dataInicial;
  const diffAnimado = diffReal * progresso;

  const d = Math.floor(diffAnimado/(1000*60*60*24));
  const h = Math.floor(diffAnimado/(1000*60*60))%24;
  const m = Math.floor(diffAnimado/(1000*60))%60;
  const s = Math.floor(diffAnimado/1000)%60;

  dias.innerText = d;
  horas.innerText = h;
  minutos.innerText = m;
  segundos.innerText = s;

  mensagem.innerText = mensagemTempo(d);

  let proxima = metas.find(m => d < m) || metas[metas.length-1];
  meta.innerText = `Próxima meta: ${proxima} dias (${d}/${proxima})`;

  requestAnimationFrame(update);
}

update();

// 🌟 ESTRELAS AMARELAS SUAVES
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

let estrelas = [];

for(let i=0;i<100;i++){
  estrelas.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2,
    speed: Math.random()*0.3
  });
}

function animar(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  estrelas.forEach(e=>{
    e.y -= e.speed;
    if(e.y < 0){
      e.y = canvas.height;
      e.x = Math.random()*canvas.width;
    }

    ctx.beginPath();
    ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
    ctx.fillStyle = "rgba(250,204,21,0.8)";
    ctx.fill();
  });

  requestAnimationFrame(animar);
}

animar();
window.addEventListener("resize", resize);
</script>

</body>
</html>
