<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempo sem briga</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background: linear-gradient(-45deg, #0f172a, #1e1b4b, #020617, #1e293b);
  background-size: 400% 400%;
  animation: bg 12s ease infinite;
  overflow:hidden;
}

@keyframes bg {
  0% { background-position:0% 50% }
  50% { background-position:100% 50% }
  100% { background-position:0% 50% }
}

/* estrelas */
#stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* entrada suave */
.card {
  animation: aparecer 1s ease;
}

@keyframes aparecer {
  from { opacity:0; transform: translateY(20px); }
  to { opacity:1; transform: translateY(0); }
}

.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:40px;
  border-radius:25px;
  text-align:center;
  width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* titulo degradê + brilho */
.titulo h1 {
  font-size:1.8rem;
  background: linear-gradient(90deg, #facc15, #a78bfa, #facc15);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: brilho 3s linear infinite;
}

@keyframes brilho {
  0% { background-position: 0% }
  100% { background-position: 200% }
}

.titulo p {
  margin-top:5px;
  font-size:0.9rem;
  color: rgba(255,255,255,0.7);
}

.tempo {
  display:flex;
  gap:10px;
  margin-top:25px;
}

.box {
  flex:1;
  background: rgba(255,255,255,0.06);
  border-radius:15px;
  padding:15px;
  transition:0.3s;
}

.box:hover {
  transform: translateY(-5px);
}

.numero {
  font-size:2rem;
  font-weight:bold;
}

.label {
  font-size:0.7rem;
  opacity:0.7;
}

/* barra de progresso */
.progress {
  margin-top:25px;
  height:8px;
  background: rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
}

.progress-bar {
  height:100%;
  width:0%;
  background: linear-gradient(90deg, #facc15, #a78bfa);
  transition:0.5s;
}

.meta-text {
  margin-top:10px;
  font-size:0.85rem;
  opacity:0.8;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="card">

  <div class="titulo">
    <h1>⏳ Tempo sem briga</h1>
    <p id="subtitulo"></p>
  </div>

  <div class="tempo">
    <div class="box"><div class="numero" id="dias">0</div><div class="label">Dias</div></div>
    <div class="box"><div class="numero" id="horas">0</div><div class="label">Horas</div></div>
    <div class="box"><div class="numero" id="minutos">0</div><div class="label">Min</div></div>
    <div class="box"><div class="numero" id="segundos">0</div><div class="label">Seg</div></div>
  </div>

  <div class="progress">
    <div class="progress-bar" id="barra"></div>
  </div>

  <div class="meta-text" id="meta"></div>

</div>

<script>
// DATA
let dataInicial = new Date("2025-10-12T11:00:00");

// formatar data
function formatarData(data) {
  return data.toLocaleDateString("pt-BR") + " às " +
         data.toLocaleTimeString("pt-BR", { hour: '2-digit', minute: '2-digit' });
}

// subtitulo
document.getElementById("subtitulo").innerText =
  "desde " + formatarData(dataInicial);

// metas progressivas
const metas = [1, 7, 30, 100, 365, 1000];

// calcular tempo
function calc(diff){
  return {
    d: Math.floor(diff/(1000*60*60*24)),
    h: Math.floor(diff/(1000*60*60))%24,
    m: Math.floor(diff/(1000*60))%60,
    s: Math.floor(diff/1000)%60
  };
}

function update(){
  const diff = new Date() - dataInicial;
  const t = calc(diff);

  dias.innerText = t.d;
  horas.innerText = t.h;
  minutos.innerText = t.m;
  segundos.innerText = t.s;

  atualizarMeta(t.d);
}

function atualizarMeta(dias){
  let proxima = metas.find(m => dias < m) || metas[metas.length-1];

  let progresso = (dias / proxima) * 100;
  barra.style.width = progresso + "%";

  meta.innerText = `Próxima meta: ${proxima} dias (${dias}/${proxima})`;
}

setInterval(update,1000);

// estrelas
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

let estrelas = [];

for(let i=0;i<120;i++){
  estrelas.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2,
    brilho: Math.random(),
    vel: Math.random()*0.02
  });
}

function animar(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  estrelas.forEach(e=>{
    e.brilho += e.vel;
    let op = (Math.sin(e.brilho)+1)/2;

    ctx.beginPath();
    ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
    ctx.fillStyle = `rgba(250,204,21,${op})`;
    ctx.fill();
  });

  requestAnimationFrame(animar);
}

animar();
window.addEventListener("resize", resize);
</script>

</body>
</html>
